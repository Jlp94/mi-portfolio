<div class="hero-section relative w-full min-h-screen flex items-center overflow-hidden px-8 md:px-16 pb-12">

  <div class="relative z-10 w-full max-w-6xl mx-auto flex flex-col gap-6">
    @if (isAvailableForWork()) {
      <div class="hero-slide-in hero-slide-in-1 flex justify-center  md:me-32">
  <span class="availability-code font-mono text-xs md:text-sm">
    <app-code-tag tag="jlp" attrName="[disponible]" [attrVal]="isAvailableForWork() ? 'true' : 'false'" [selfClose]="true" />
  </span>
      </div>
    }
    <div class="flex flex-col items-center justify-center w-full gap-6 text-center">
      <h1
        class="hero-title hero-slide-in hero-slide-in-2 font-display font-semibold tracking-tight text-2xl md:text-3xl lg:text-[2.5rem] md:me-32">
        <span class="hero-greeting">{{ languageService.translations().hero.greeting }} </span>
        <span class="hero-name">Jose Luis Prieto</span>
        <span class="hero-dot">.</span>
      </h1>

      <div
        class="hero-slide-in-right hero-slide-in-4 flex items-center justify-center gap-4 text-xl md:text-2xl lg:text-[2.5rem]">
        <p class="hero-role font-display font-semibold tracking-widest">
          {{ languageService.translations().hero.role }}
        </p>
        <div class="hero-cv-container">
          <a href="cv/CvJoseLuisPrieto2026.pdf" download="CvJoseLuisPrieto2026.pdf"
             class="hero-cv-btn flex items-center justify-center rounded-full border transition-all duration-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2"
             [attr.aria-label]="languageService.translations().hero.cvAriaLabel">
            <fa-icon [icon]="faFilePdf" class="text-2xl"></fa-icon>
            <span class="hero-cv-text">CV</span>
          </a>
        </div>
      </div>

    </div>
  </div>

  <a href="#about-me"
     class="scroll-indicator-container focus:outline-none focus-visible:ring-2 focus-visible:ring-sky-400 rounded-full"
     aria-label="Ir a la sección Sobre mí">
    <svg class="scroll-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path class="arrow-line-1" d="M7 9l5 5 5-5" />
      <path class="arrow-line-2" d="M7 14l5 5 5-5" />
    </svg>
  </a>
</div>
