<div class="hero-section relative w-full min-h-screen flex items-center overflow-hidden px-8 md:px-16 pb-12">

  <div
    class="hero-blob hero-blob-one absolute w-[300px] h-[300px] md:w-[700px] md:h-[700px] rounded-full pointer-events-none"
    [style]="blobStyles().one" aria-hidden="true"></div>

  <div
    class="hero-blob hero-blob-two absolute w-[250px] h-[250px] md:w-[550px] md:h-[550px] rounded-full pointer-events-none"
    [style]="blobStyles().two" aria-hidden="true"></div>

  <div
    class="hero-blob hero-blob-three absolute w-[180px] h-[180px] md:w-[400px] md:h-[400px] rounded-full pointer-events-none"
    [style]="blobStyles().three" aria-hidden="true"></div>

  <div
    class="hero-blob hero-blob-four absolute w-[200px] h-[200px] md:w-[450px] md:h-[450px] rounded-full pointer-events-none"
    [style]="blobStyles().four" aria-hidden="true"></div>

  <div
    class="hero-blob hero-blob-five absolute w-[150px] h-[150px] md:w-[350px] md:h-[350px] rounded-full pointer-events-none"
    [style]="blobStyles().five" aria-hidden="true"></div>

  <div
    class="hero-blob hero-blob-six absolute w-[160px] h-[160px] md:w-[380px] md:h-[380px] rounded-full pointer-events-none"
    [style]="blobStyles().six" aria-hidden="true"></div>

  <div
    class="hero-blob hero-blob-seven absolute w-[140px] h-[140px] md:w-[320px] md:h-[320px] rounded-full pointer-events-none"
    [style]="blobStyles().seven" aria-hidden="true"></div>

  <div class="relative z-10 w-full max-w-6xl mx-auto flex flex-col gap-10">
    <div class="flex flex-col ml-4 md:ml-16 lg:ml-20">
      <span
        class="hero-subtitle hero-slide-in hero-slide-in-1 font-display font-medium text-xl md:text-2xl tracking-widest mb-4">
        {{ languageService.translations().hero.greeting }}
      </span>
      <h1 class="hero-title font-display font-medium tracking-tight">
        <span class="hero-slide-in hero-slide-in-2 block text-5xl md:text-7xl lg:text-[8rem] mb-2">Jose</span>
        <span
          class="hero-slide-in hero-slide-in-3 block text-5xl md:text-7xl lg:text-[8rem] ml-10 md:ml-20 lg:ml-28 mb-2">Luis</span>
        <span
          class="hero-slide-in hero-slide-in-4 block text-5xl md:text-7xl lg:text-[8rem] ml-16 md:ml-28 lg:ml-48">Prieto<span
            class="text-accent">.</span></span>
      </h1>
    </div>

    <div class="flex flex-col items-center w-full">
      <div class="hero-slide-in hero-slide-in-5 flex items-center justify-center gap-4 mb-8">
        <p class="hero-role font-display font-semibold text-lg md:text-xl tracking-widest">
          {{ languageService.translations().hero.role }}
        </p>
        <a href="/cv/CvJoseLuisPrieto2026.pdf" download="CvJoseLuisPrieto2026.pdf"
          class="hero-cv-btn flex items-center justify-center rounded-full border transition-all duration-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2"
          [attr.aria-label]="languageService.translations().hero.cvAriaLabel">
          <fa-icon [icon]="faFilePdf" class="text-2xl"></fa-icon>
          <span class="hero-cv-text">CV</span>
        </a>
      </div>
    </div>
  </div>

  <app-scroll-badge targetId="#about-me" class="absolute bottom-10 right-10 z-10" />
</div>
