<div class="about-stack-container max-w-7xl mx-auto px-6 py-20 md:py-32 relative z-10">

  <div class="section-header-centered select-none font-display mb-16 text-center flex flex-col items-center">
    <h2 class="section-title-centered font-bold tracking-tight">
      <span class="text-about-title-1">{{ t().titleLine1 }}</span>
      <span class="text-about-title-2 ml-2">{{ t().titleLine2 }}</span><span class="text-accent">.</span>
    </h2>
    <div class="section-line mt-4 mx-auto"></div>
  </div>

  <div class="bullets-container grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-10">
    @for (icon of bulletIcons(); track $index; let i = $index) {
    <div class="bullet-wrap flex flex-col items-center text-center" [class.bullet-left]="i < 2"
      [class.bullet-right]="i >= 2">
      <div class="shape-wrap mb-4">
        <div class="core-value-shape">
          <fa-icon [icon]="getIcon(i)"></fa-icon>
        </div>
      </div>
      <h3 class="bullet-title font-sans text-xl font-bold mb-2">{{ getTitle(i) }}</h3>
      <p class="bullet-text font-sans text-md opacity-85 max-w-[240px] leading-relaxed">{{ getDesc(i) }}</p>
    </div>
    }
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 lg:gap-28 items-start pt-10">
    <div class="about-stack-left">
      <app-about-me class="w-full" />
    </div>
    <div class="about-stack-right">
      <app-stack class="w-full" />
    </div>
  </div>

</div>
