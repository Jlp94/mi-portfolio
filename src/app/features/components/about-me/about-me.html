<div class="about-me-content w-full flex flex-col items-center lg:items-start">
  
  <div class="profile-image-wrap mb-8 w-full flex justify-center">
    <div class="profile-image-container">
      <img src="Yo.jpeg" alt="Jose Luis Prieto" class="profile-img" />
    </div>
  </div>

  <h3 class="about-me-subtitle font-sans text-2xl font-bold mb-6 w-full text-center">{{ t().whoAmITitle }}</h3>

  <div class="about-me-body w-full pl-0 text-left">
    <div class="about-me-statements flex flex-col gap-3">
      
      <p class="about-me-statement text-sm font-normal tracking-normal leading-relaxed text-left">
        <span>{{ t().text1 }}</span>
        <span class="highlight highlight-1">{{ t().highlight1 }}</span>
        <span>{{ t().text2 }}</span>
      </p>

      <p class="about-me-statement text-sm font-normal tracking-normal leading-relaxed text-left">
        <span>{{ t().text3 }}</span>
        <span class="highlight highlight-2">{{ t().highlight2 }}</span>
        <span>{{ t().text3_2 }}</span>
      </p>

      <p class="about-me-statement text-sm font-normal tracking-normal leading-relaxed text-left">
        <span>{{ t().text4 }}</span>
        <span class="highlight highlight-3">{{ t().highlight3 }}</span>
        <span>{{ t().text4_2 }}</span>
      </p>

      <p class="about-me-statement text-sm font-normal tracking-normal leading-relaxed text-left">
        <span>{{ t().text5_pre }}</span>
        <span class="highlight highlight-4">{{ t().highlight4 }}</span>
        <span>{{ t().text5 }}</span>
      </p>

    </div>
  </div>
</div>
