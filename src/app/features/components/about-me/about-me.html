<app-shared-section id="about-me" title="" maxWidth="max-w-7xl"
  heightClass="h-auto flex flex-col justify-start pt-12 md:pt-20 pb-8 overflow-visible">
  <div class="about-me-content">
    <div class="about-me-header mb-6 select-none font-display">
      <span class="text-xs font-mono opacity-65 mb-1 block">
        <app-code-tag tag="h2" attrName="class" attrVal="section-title"></app-code-tag>
      </span>
      <h2 class="text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight leading-none">
        <span class="block text-about-title-1 pl-4">{{ t().titleLine1 }}</span>
        <span class="block text-about-title-2 ml-28 md:ml-[9rem] lg:ml-[11.5rem] -mt-2 md:-mt-4 lg:-mt-5">
          {{ t().titleLine2 }}<span class="text-accent">.</span>
        </span>
      </h2>
      <span class="text-xs font-mono opacity-65 mt-1 block">
        <app-code-tag tag="h2" [isClose]="true"></app-code-tag>
      </span>
    </div>

    <div class="about-me-body pl-0">
      <span class="text-xs font-mono opacity-65 mb-1 block">
        <app-code-tag tag="p" attrName="class" attrVal="profile"></app-code-tag>
      </span>

      <div class="about-me-statements pl-4 flex flex-col gap-6 md:gap-8">
        <p
          class="about-me-statement text-base md:text-[1.5rem] lg:text-[1.85rem] font-bold tracking-tight leading-relaxed md:leading-normal">
          <span>{{ t().text1 }}</span>
          <span class="highlight highlight-1">{{ t().highlight1 }}</span>
          <span>{{ t().text2 }}</span>
        </p>

        <p
          class="about-me-statement text-base md:text-[1.5rem] lg:text-[1.85rem] font-bold tracking-tight leading-relaxed md:leading-normal">
          <span>{{ t().text3 }}</span>
          <span class="highlight highlight-2">{{ t().highlight2 }}</span>
          <span>{{ t().text3_2 }}</span>
          <span class="highlight highlight-3">{{ t().highlight3 }}</span>
          <span>{{ t().text4 }}</span>
        </p>

        <p
          class="about-me-statement text-base md:text-[1.5rem] lg:text-[1.85rem] font-bold tracking-tight leading-relaxed md:leading-normal">
          <span>{{ t().text5_pre }}</span>
          <span class="highlight highlight-4">{{ t().highlight4 }}</span>
          <span>{{ t().text5 }}</span>
        </p>
      </div>

      <span class="text-xs font-mono opacity-65 mt-2 block">
        <app-code-tag tag="p" [isClose]="true"></app-code-tag>
      </span>
    </div>
  </div>
</app-shared-section>
