<div class="contact-container w-full flex flex-col-reverse lg:grid lg:grid-cols-2 relative overflow-hidden">
  <!-- Left Column: Contact Form Area -->
  <div class="contact-left-panel flex flex-col justify-center items-center px-6 py-8 md:p-10 lg:p-12 text-center relative z-10">
    <div class="contact-header-wrap flex flex-col gap-7 items-center w-full max-w-lg">
      <h2 class="contact-title text-3xl md:text-4xl lg:text-5xl font-bold tracking-tight">
        {{ t().title }}
      </h2>

      <!-- Horizontal line -->
      <div class="contact-line"></div>

      <p class="contact-subtitle text-base md:text-lg font-medium">
        {{ t().subtitle }}
      </p>
    </div>

    <!-- Contact Form -->
    <form class="contact-form mt-10 flex flex-col gap-5 w-full max-w-lg" (submit)="onSubmit($event)">
      <div class="form-group flex flex-col w-full text-left">
        <label for="name" class="sr-only">{{ t().placeholderName }}</label>
        <input type="text" id="name" name="name" required [placeholder]="t().placeholderName" class="form-input" [disabled]="submissionStatus() === 'loading'" [(ngModel)]="name" />
      </div>

      <div class="form-group flex flex-col w-full text-left">
        <label for="email" class="sr-only">{{ t().placeholderEmail }}</label>
        <input type="email" id="email" name="email" required [placeholder]="t().placeholderEmail" class="form-input" [disabled]="submissionStatus() === 'loading'" [(ngModel)]="email" />
      </div>

      <div class="form-group flex flex-col w-full text-left">
        <label for="message" class="sr-only">{{ t().placeholderMessage }}</label>
        <textarea id="message" name="message" rows="4" required [placeholder]="t().placeholderMessage"
          class="form-textarea" [disabled]="submissionStatus() === 'loading'" [(ngModel)]="message"></textarea>
      </div>

      <div class="flex justify-between items-center mt-3 w-full">
        <!-- Message area to the left of the submit button -->
        <div class="text-left flex-grow mr-4">
          @if (submissionStatus() === 'success') {
            <span class="text-xs font-semibold text-emerald-600 dark:text-emerald-400">
              {{ t().successMessage }}
            </span>
          } @else if (submissionStatus() === 'error') {
            <span class="text-xs font-semibold text-rose-600 dark:text-rose-400">
              {{ t().errorMessage }}
            </span>
          } @else if (showValidationError()) {
            <span class="text-xs font-semibold text-rose-600 dark:text-rose-400">
              {{ t().validationError }}
            </span>
          }
        </div>

        <button type="submit" class="contact-submit-btn" [disabled]="submissionStatus() === 'loading'">
          {{ submissionStatus() === 'loading' ? t().sending : t().submit }}
        </button>
      </div>
    </form>
  </div>

  <!-- Right Column: Placeholder Area -->
  <div class="contact-right-panel flex items-center justify-center relative z-10">
    <!-- This panel is intentionally left blank for future content and will sit on top on mobile -->
  </div>
</div>
