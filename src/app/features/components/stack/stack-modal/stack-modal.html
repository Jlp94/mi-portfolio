<dialog #stackDialog class="animate-dialog zoom fast detail-panel is-mobile-dialog"
  (click)="onDialogClick($event)" (cancel)="onCancel($event)">
  <div class="detail-content-wrapper" (touchstart)="onTouchStart($event)" (touchend)="onTouchEnd($event)">
    <div class="detail-icons-side">
      <div class="icons-area icons-compact select-none">
        @for (tech of getCategoryTechs(category()); track tech) {
        <div class="tech-wrapper">
          <div class="tech-content">
            <div class="tech-symbol-btn tech-{{tech}}">
              <app-tech-icon [key]="tech" customClass="w-8 h-8 md:w-9 md:h-9" />
            </div>
          </div>
        </div>
        }
      </div>
    </div>
    <div class="detail-content-side">
      <div class="text-drawer">
        <div class="tech-details-card">
          <p class="details-tech-desc main-desc" [innerHTML]="getSplitTechDesc(category())"></p>
          @if (hasExtraDetails(category())) {
          <div class="details-block">
            <h4 class="details-subtitle" [innerHTML]="getSplitText(getFirstBlockTitle())"></h4>
            <ul class="details-list">
              @for (item of getEcosystem(category()); track item) {
              <li [innerHTML]="getSplitText('• ' + item)"></li>
              }
            </ul>
          </div>
          @if (getSecondBlockItems(category()).length > 0) {
          <div class="details-block">
            <h4 class="details-subtitle" [innerHTML]="getSplitText(getSecondBlockTitle(category()))"></h4>
            <p class="details-inline-text" [innerHTML]="getSplitText(getSecondBlockItems(category()).join(' • '))">
            </p>
          </div>
          }
          @if (getThirdBlockItems(category()).length > 0) {
          <div class="details-block">
            <h4 class="details-subtitle" [innerHTML]="getSplitText(getThirdBlockTitle(category()))"></h4>
            <p class="details-inline-text" [innerHTML]="getSplitText(getThirdBlockItems(category()).join(' • '))">
            </p>
          </div>
          }
          }
        </div>
        <div class="flex justify-end mt-4">
          <button class="detail-close-btn" (click)="onClose()" aria-label="Cerrar detalles">
            <fa-icon [icon]="faXmark" />
          </button>
        </div>
      </div>
    </div>
  </div>
</dialog>
