<a
  [href]="targetId()"
  class="scroll-badge-container group focus:outline-none focus-visible:ring-2 rounded-full"
  [attr.aria-label]="ariaLabel()"
>
  <svg class="absolute w-full h-full animate-spin-slow" viewBox="0 0 100 100">
    <defs>
      <path id="circle-path" d="M 50, 50 m -37, 0 a 37,37 0 1,1 74,0 a 37,37 0 1,1 -74,0"></path>
    </defs>
    <text class="scroll-badge-text" textLength="220" lengthAdjust="spacing">
      <textPath href="#circle-path">{{ badgeText() }}</textPath>
    </text>
  </svg>
  <div class="scroll-badge-ring group-hover:scale-110">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="scroll-badge-arrow w-4 h-4 transition-transform duration-300"
      [class.rotate-180]="isUp()"
      [class.group-hover:-translate-y-1]="isUp()"
      [class.group-hover:translate-y-1]="!isUp()"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2.5"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
    </svg>
  </div>
</a>
