<span
  class="shared-badge text-xs font-medium px-2.5 py-0.5 rounded-full select-none inline-flex items-center gap-1.5 transition-all duration-200"
  [class.badge-sky]="color() === 'sky'"
  [class.badge-violet]="color() === 'violet'"
  [class.badge-emerald]="color() === 'emerald'"
  [class.badge-teal]="color() === 'teal'"
  [class.badge-slate]="color() === 'slate'"
>
  <ng-content />
</span>
