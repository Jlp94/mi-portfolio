<section
  [id]="id()"
  class="w-full min-h-screen flex flex-col justify-center relative py-20 px-6 max-w-6xl mx-auto"
>
  <div class="mb-12 flex flex-col items-start font-display">
    <span class="text-xs text-sky-500 font-mono opacity-65 mb-2 select-none">
      &lt;section id="{{ id() }}"&gt;
    </span>
    
    <div class="flex flex-col ml-4">
      @if (subtitle()) {
        <span class="text-xs tracking-widest uppercase text-sky-400 font-semibold mb-2">
          {{ subtitle() }}
        </span>
      }
      <h2 class="text-3xl md:text-5xl font-bold tracking-tight text-white">
        {{ title() }}
      </h2>
    </div>
    
    <span class="text-xs text-sky-500 font-mono opacity-65 mt-2 select-none">
      &lt;details&gt;
    </span>
  </div>

  <div class="w-full pl-4 md:pl-8">
    <ng-content />
  </div>

  <div class="mt-12 flex flex-col items-start font-mono text-xs text-sky-500 opacity-65 pl-4 select-none">
    <span>&lt;/details&gt;</span>
    <span class="mt-2 pl-0">&lt;/section&gt;</span>
  </div>
</section>
