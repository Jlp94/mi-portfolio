<section [id]="id()" class="w-full relative px-6 mx-auto" [class]="heightClass() + ' ' + maxWidth()">
  <div class="mb-6 flex flex-col items-start font-display">
    <span class="text-xs font-mono opacity-65 mb-1 select-none">
      <app-code-tag tag="section" attrName="id" [attrVal]="id()"></app-code-tag>
    </span>

    @if (title()) {
    <div class="flex flex-col ml-4">
      @if (subtitle()) {
      <span class="text-xs tracking-widest uppercase text-sky-400 font-semibold mb-2">
        {{ subtitle() }}
      </span>
      }
      <h2 class="text-3xl md:text-5xl font-bold tracking-tight text-white">
        @if (title().endsWith('.')) {
        {{ title().slice(0, -1) }}<span class="text-accent">.</span>
        } @else {
        {{ title() }}
        }
      </h2>
    </div>
    }

    <span class="text-xs font-mono opacity-65 mt-1 select-none pl-4">
      <app-code-tag tag="details"></app-code-tag>
    </span>
  </div>

  <div class="w-full pl-8 md:pl-12">
    <ng-content />
  </div>

  <div class="section-closing-tags mt-4 flex flex-col items-start font-mono text-xs opacity-65 select-none">
    <span class="pl-4">
      <app-code-tag tag="details" [isClose]="true"></app-code-tag>
    </span>
    <span class="mt-1 pl-0">
      <app-code-tag tag="section" [isClose]="true"></app-code-tag>
    </span>
  </div>
</section>
