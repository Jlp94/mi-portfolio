<header
  class="fixed top-0 left-0 w-full z-50 transition-all duration-500 ease-in-out backdrop-blur-md border-b"
  style="background: color-mix(in srgb, var(--color-cyan-50) 80%, transparent); border-color: color-mix(in srgb, var(--color-sky-700) 10%, transparent);"
  [class.translate-y-0]="isVisible()"
  [class.opacity-100]="isVisible()"
  [class.pointer-events-auto]="isVisible()"
  [class.-translate-y-full]="!isVisible()"
  [class.opacity-0]="!isVisible()"
  [class.pointer-events-none]="!isVisible()"
>
  <div class="max-w-6xl mx-auto px-6 h-12 flex items-center justify-center">
    <nav class="hidden md:flex items-center gap-10" aria-label="Navegación de escritorio">
      <a href="#about-me" class="nav-link text-xs tracking-wide focus:outline-none focus-visible:ring-1 rounded px-2 py-1">
        Sobre Mí
      </a>
      <a href="#stacks" class="nav-link text-xs tracking-wide focus:outline-none focus-visible:ring-1 rounded px-2 py-1">
        Tecnologías
      </a>
      <a href="#experience-education" class="nav-link text-xs tracking-wide focus:outline-none focus-visible:ring-1 rounded px-2 py-1">
        Experiencia
      </a>
      <a href="#projects" class="nav-link text-xs tracking-wide focus:outline-none focus-visible:ring-1 rounded px-2 py-1">
        Proyectos
      </a>
      <a href="#contact" class="nav-link text-xs tracking-wide focus:outline-none focus-visible:ring-1 rounded px-2 py-1">
        Contacto
      </a>
    </nav>

    <button
      (click)="toggleMenu()"
      class="md:hidden w-8 h-8 flex flex-col items-center justify-center gap-1 focus:outline-none focus-visible:ring-1 rounded transition-colors" style="color: #193741;"
      [attr.aria-expanded]="isMenuOpen()"
      aria-controls="mobile-nav"
      aria-label="Menú de navegación"
    >
      <span
        class="w-4.5 h-0.5 bg-current transition-all duration-300"
        [class.rotate-45]="isMenuOpen()"
        [class.translate-y-1.5]="isMenuOpen()"
      ></span>
      <span
        class="w-4.5 h-0.5 bg-current transition-all duration-300"
        [class.opacity-0]="isMenuOpen()"
      ></span>
      <span
        class="w-4.5 h-0.5 bg-current transition-all duration-300"
        [class.-rotate-45]="isMenuOpen()"
        [class.-translate-y-1.5]="isMenuOpen()"
      ></span>
    </button>
  </div>

  <div
    id="mobile-nav"
    class="mobile-menu-container md:hidden fixed top-[48px] left-0 w-full h-[calc(100vh-48px)] backdrop-blur-lg transition-all duration-300 ease-in-out transform flex flex-col items-center justify-center gap-8 z-40"
    [class.translate-x-0]="isMenuOpen()"
    [class.opacity-100]="isMenuOpen()"
    [class.pointer-events-auto]="isMenuOpen()"
    [class.translate-x-full]="!isMenuOpen()"
    [class.opacity-0]="!isMenuOpen()"
    [class.pointer-events-none]="!isMenuOpen()"
    aria-label="Navegación móvil"
  >
    <a
      (click)="closeMenu()"
      href="#about-me"
      class="mobile-nav-link text-lg transition-colors"
    >
      Sobre Mí
    </a>
    <a
      (click)="closeMenu()"
      href="#stacks"
      class="mobile-nav-link text-lg transition-colors"
    >
      Tecnologías
    </a>
    <a
      (click)="closeMenu()"
      href="#experience-education"
      class="mobile-nav-link text-lg transition-colors"
    >
      Experiencia
    </a>
    <a
      (click)="closeMenu()"
      href="#projects"
      class="mobile-nav-link text-lg transition-colors"
    >
      Proyectos
    </a>
    <a
      (click)="closeMenu()"
      href="#contact"
      class="mobile-nav-link text-lg transition-colors"
    >
      Contacto
    </a>
  </div>
</header>
