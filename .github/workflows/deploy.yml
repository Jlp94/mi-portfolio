name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --only-built-dependencies

      - name: Build
        run: pnpm run build-gh-pages

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/mi-portfolio/browser

      - name: Deploy
        uses: actions/deploy-pages@v4
